<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="twitter:card" content="summary_large_image">

    <link rel="canonical" href="https://kahransingh.com/photography.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet">
    <style>
        main {
            max-width: none;
            padding-top: 0;
        }

        /* Cover photo hero */
        .cover-hero {
            max-width: 640px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            margin-bottom: 0.5rem;
            line-height: 0;
        }

        .cover-hero img {
            width: 100%;
            display: block;
            filter: contrast(1.05);
            cursor: pointer;
        }

        .cover-caption {
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 3rem;
        }

        /* Page header below cover */
        .photo-page-header {
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e0ddd8;
        }

        .photo-page-header h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 2rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1.3;
        }

        .photo-page-header p {
            color: #666;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        /* Series rows */
        .series-row {
            margin-bottom: 2.5rem;
        }

        .series-label {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 1.05rem;
            font-weight: 400;
            font-style: italic;
            color: #1a1a1a;
            margin-bottom: 0.75rem;
        }

        .series-scroll {
            overflow: hidden;
            position: relative;
        }

        .series-track {
            display: flex;
            gap: 0.5rem;
            width: max-content;
            animation: marquee var(--duration, 30s) linear infinite;
        }

        .series-scroll:hover .series-track {
            animation-play-state: paused;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .series-track img {
            height: 300px;
            width: auto;
            flex-shrink: 0;
            filter: contrast(1.05);
            cursor: pointer;
            transition: opacity 0.3s ease;
            border-radius: 2px;
        }

        .series-scroll img:hover {
            opacity: 0.85;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .cover-hero {
                height: 50vh;
            }

            main {
                padding-top: 0;
            }

            .photo-page-header h1 {
                font-size: 1.6rem;
            }

            .series-scroll img {
                height: 220px;
            }

            .series-label {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <a href="/" class="mobile-header">kahran</a>

        <div class="cover-hero">
            <img id="cover-img" src="photos/roma-sidewalk.jpg" alt="">
        </div>
        <p class="cover-caption" id="cover-caption"></p>

        <div class="photo-page-header">
            <h1>photography</h1>
            <p>Shot on the Leica Q2 Monochrome, across the world.</p>
        </div>

        <div id="series-container"></div>

    </main>

    <nav>
        <a href="/" class="nav-name">kahran</a>
        <a href="/poetry.html">poetry</a>
        <a href="/photography.html" class="active">photography</a>
        <a href="/projects.html">projects</a>
        <a href="/speaking.html">speaking</a>
        <a href="/archive.html">archive</a>
        <a href="/about.html">about</a>
    </nav>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
    // All photos with series groupings
    const series = [
        {
            name: 'Mexico',
            photos: [
                { src: 'photos/roma-sidewalk.jpg', alt: 'Night sidewalk in Roma Norte, Mexico City', caption: 'Roma Norte, Mexico City' },
                { src: 'photos/papel-picado.jpg', alt: 'Street with papel picado overhead in Sayulita', caption: 'Sayulita, Nayarit' },
                { src: 'photos/night-street.jpg', alt: 'Night street with palm trees in Roma Norte', caption: 'Roma Norte, Mexico City' },
                { src: 'photos/staircase.jpg', alt: 'Figure on a staircase in Sayulita', caption: 'Sayulita, Nayarit' },
                { src: 'photos/cdmx-plaza.jpg', alt: 'Plaza at night in Roma Norte, Mexico City', caption: 'Roma Norte, Mexico City' },
                { src: 'photos/lanterns.jpg', alt: 'Lanterns and palm tree at night in Sayulita', caption: 'Sayulita, Nayarit' },
                { src: 'photos/taco-cart.jpg', alt: 'Taco cart at night in Sayulita', caption: 'Sayulita, Nayarit' },
                { src: 'photos/night-market.jpg', alt: 'Night market vendors in Sayulita', caption: 'Sayulita, Nayarit' },
                { src: 'photos/sayulita-staircase.jpg', alt: 'Staircase at night in Sayulita', caption: 'Sayulita, Nayarit' },
                { src: 'photos/sidewalk-shadows.jpg', alt: 'Tree shadows on sidewalk', caption: 'Mexico City' },
                { src: 'photos/mexico-plaza-476B1258.jpg', alt: 'Plaza with sculpture', caption: 'Guadalajara' },
                { src: 'photos/surfers-walking-6CE80723.jpg', alt: 'Surfers walking up hill', caption: 'Mexico' },
                { src: 'photos/jungle-path-DAB66F7D.jpg', alt: 'Lush jungle path', caption: 'Mexico' }
            ]
        },
        {
            name: 'Fire Island',
            photos: [
                { src: 'photos/beach-solitude.jpg', alt: 'Lone figure on a beach', caption: 'Fire Island, New York' },
                { src: 'photos/reed-corridor.jpg', alt: 'Path through tall reeds', caption: 'Fire Island, New York' },
                { src: 'photos/beach-boardwalk.jpg', alt: 'Boardwalk vanishing point through pines', caption: 'Fire Island, New York' }
            ]
        },
        {
            name: 'Wyoming',
            photos: [
                { src: 'photos/wyoming-road.jpg', alt: 'Path through a forest', caption: 'Wyoming' },
                { src: 'photos/dead-forest.jpg', alt: 'Dead forest', caption: 'Wyoming' },
                { src: 'photos/beach-painter.jpg', alt: 'Person painting on beach', caption: 'Wyoming' }
            ]
        },
        {
            name: 'Hawaii',
            photos: [
                { src: 'photos/misty-hillside.jpg', alt: 'Misty hillside with figure walking', caption: 'Big Island, Hawaii' },
                { src: 'photos/hawaii-landscape.jpg', alt: 'Volcanic landscape at dusk', caption: 'Hawaii' },
                { src: 'photos/van-sleeping.jpg', alt: 'Van on a quiet road', caption: 'Hawaii' },
                { src: 'photos/tree-tunnel.jpg', alt: 'Tree-lined path', caption: 'Hawaii' },
                { src: 'photos/banyan-tree-6A29610A.jpg', alt: 'Banyan tree with figure', caption: 'Hawaii' },
                { src: 'photos/boat-friends-A963213F.jpg', alt: 'Friends on a boat', caption: 'Hawaii' }
            ]
        },
        {
            name: 'Berlin',
            photos: [
                { src: 'photos/berlin-street.jpg', alt: 'Street with vintage Porsche', caption: 'Berlin' },
                { src: 'photos/concrete-museum.jpg', alt: 'Concrete interior with art installation', caption: 'Berlin' }
            ]
        },
        {
            name: 'Pacific Northwest',
            photos: [
                { src: 'photos/alpine-lake.jpg', alt: 'Alpine lake with mountains', caption: 'Mt Rainier, Washington' },
            ]
        },
        {
            name: 'New England',
            photos: [
                { src: 'photos/buoys-wall.jpg', alt: 'Wall of buoys', caption: 'Cape Cod' },
                { src: 'photos/fireworks-water.jpg', alt: 'Fireworks over water', caption: 'Cape Cod' },
                { src: 'photos/rainy-night.jpg', alt: 'Rainy night by a house', caption: 'Portland, Maine' },
                { src: 'photos/still-lake.jpg', alt: 'Still lake with cloud reflections', caption: 'Yellowstone' }
            ]
        },
        {
            name: 'New York',
            photos: [
                { src: 'photos/hudson-pier.jpg', alt: 'Waterfront pier', caption: 'New York City' }
            ]
        },
        {
            name: 'Yosemite',
            photos: [
                { src: 'photos/yosemite-valley.jpg', alt: 'Yosemite valley', caption: 'Yosemite' },
                { src: 'photos/yosemite-trail.jpg', alt: 'Yosemite trail', caption: 'Yosemite' }
            ]
        },
        {
            name: 'Telluride',
            photos: [
                { src: 'photos/kitchen-night.jpg', alt: 'Figure in kitchen at night', caption: 'Telluride, Colorado' }
            ]
        },
        {
            name: 'Japan',
            photos: [
                { src: 'photos/glass-sculpture-C9B56AB5.jpg', alt: 'Glass sculpture in gallery', caption: 'Japan' },
                { src: 'photos/japan-gallery-quilt-27BBE65D.jpg', alt: 'Gallery with textile art', caption: 'Japan' },
                { src: 'photos/japan-bridge-night-03BAB9C2.jpg', alt: 'Bridge at night', caption: 'Tokyo' },
                { src: 'photos/infinity-room-BD764E63.jpg', alt: 'Infinity mirror room', caption: 'Tokyo' }
            ]
        },
        {
            name: 'Bhutan',
            photos: [
                { src: 'photos/snowy-pass-648E669E.jpg', alt: 'Snowy mountain pass', caption: 'Bhutan' },
                { src: 'photos/sea-cliff-8632EF29.jpg', alt: 'Mountain cliff', caption: 'Bhutan' },
                { src: 'photos/bhutan-summit-6D1ECE66.jpg', alt: 'Hiker on summit', caption: 'Bhutan' }
            ]
        },
        {
            name: 'India',
            photos: [
                { src: 'photos/restaurant-night.jpg', alt: 'Restaurant through foliage at night', caption: 'Kerala' },
                { src: 'photos/scooter-beach.jpg', alt: 'Scooter on a beach', caption: 'Goa' },
                { src: 'photos/diwali-gifts-7E597412.jpg', alt: 'Diwali gifts', caption: 'Bangalore' },
                { src: 'photos/wood-spiral-4DC35586.jpg', alt: 'Wood stack spiral', caption: 'India' }
            ]
        },
        {
            name: 'Louisiana',
            photos: [
                { src: 'photos/cypress-kayak-F5BA8A7A.jpg', alt: 'Kayaking through cypress swamp', caption: 'Louisiana' }
            ]
        }
    ];

    // Flatten all photos for the cover picker
    const allPhotos = series.flatMap(s => s.photos.map(p => ({ ...p, series: s.name })));

    // Random cover photo
    const cover = allPhotos[Math.floor(Math.random() * allPhotos.length)];
    document.getElementById('cover-img').src = cover.src;
    document.getElementById('cover-img').alt = cover.alt;
    document.getElementById('cover-caption').textContent = cover.caption;

    // Build series rows
    const container = document.getElementById('series-container');
    series.forEach(s => {
        const row = document.createElement('div');
        row.className = 'series-row';

        const label = document.createElement('h3');
        label.className = 'series-label';
        label.textContent = s.name;
        row.appendChild(label);

        const scroll = document.createElement('div');
        scroll.className = 'series-scroll';

        const track = document.createElement('div');
        track.className = 'series-track';

        // Add photos twice for seamless loop
        for (let pass = 0; pass < 2; pass++) {
            s.photos.forEach(p => {
                const img = document.createElement('img');
                img.src = p.src;
                img.alt = p.alt;
                img.loading = 'lazy';
                img.addEventListener('click', () => openLightbox(p.src, p.alt));
                track.appendChild(img);
            });
        }

        // Speed: ~8 seconds per photo
        track.style.setProperty('--duration', (s.photos.length * 8) + 's');

        scroll.appendChild(track);
        row.appendChild(scroll);
        container.appendChild(row);
    });

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(src, alt) {
        lightboxImg.src = src;
        lightboxImg.alt = alt || '';
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }

    lightbox.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox();
    });

    // Cover photo click opens lightbox too
    document.getElementById('cover-img').addEventListener('click', () => {
        openLightbox(cover.src, cover.alt);
    });
    </script>
</body>
</html>
