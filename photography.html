    <style>
        main {
            max-width: 100%;
            margin: 0 auto;
            padding: 2rem 1.5rem 0;
        }

        .photo-page-header {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 1rem;
            text-align: center;
        }

        .photo-page-header h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 2rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1.3;
            margin: 0;
        }

        .photo-page-header p {
            color: #bbb;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            letter-spacing: 0.03em;
        }

        /* Single-column gallery */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25vh;
        }

        .photo-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 25vh 0;
        }

        .photo-wrap img {
            max-width: 700px;
            width: 100%;
            display: block;
            cursor: pointer;
            filter: contrast(1.05);
        }

        /* Alternate narrower widths for breathing rhythm */
        .photo-wrap.narrow img {
            max-width: 500px;
        }

        /* Diptych pairs */
        .photo-pair {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 25vh 0;
        }

        .photo-pair .pair-inner {
            display: flex;
            gap: 0.5rem;
            max-width: 900px;
            width: 100%;
        }

        .photo-pair .pair-inner img {
            width: 50%;
            display: block;
            cursor: pointer;
            filter: contrast(1.05);
            object-fit: cover;
        }

        /* Fade-in animation */
        .photo-wrap, .photo-pair {
            opacity: 0;
            transition: opacity 2.5s ease;
        }

        .photo-wrap.visible, .photo-pair.visible {
            opacity: 1;
        }

        .photo-wrap.no-fade, .photo-pair.no-fade {
            opacity: 1;
            transition: none;
        }

        /* Photo counter */
        .photo-counter {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            color: #e8e6e1;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        /* Footer */
        .photo-footer {
            text-align: center;
            padding: 10vh 0 6rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .photo-footer p {
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-size: 0.85rem;
            color: #bbb;
            margin: 0 0 1.5rem;
        }

        .photo-footer a {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: #999;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
            padding-bottom: 2px;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .photo-footer a:hover {
            color: #333;
            border-color: #999;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        /* Auto-scroll indicator */
        .auto-scroll-indicator {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            animation: scrollIndicatorFade 4s ease forwards;
        }

        .auto-scroll-indicator::after {
            content: ' \u25BE';
            font-size: 0.8em;
        }

        @keyframes scrollIndicatorFade {
            0% { opacity: 0; }
            15% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (max-width: 768px) {
            main {
                padding: 1.5rem 1rem 0;
            }

            .photo-page-header h1 {
                font-size: 1.6rem;
            }

            .gallery {
                padding-top: 10vh;
            }

            .photo-wrap {
                padding: 10vh 0;
            }

            .photo-wrap img {
                max-width: 100%;
                padding: 0 0.5rem;
                box-sizing: border-box;
            }

            .photo-wrap.narrow img {
                max-width: 100%;
            }

            .photo-pair {
                padding: 10vh 0;
            }

            .photo-pair .pair-inner {
                max-width: 100%;
                padding: 0 0.5rem;
                box-sizing: border-box;
            }

            .photo-counter {
                bottom: 1.2rem;
                right: 1.2rem;
                font-size: 0.65rem;
                color: #e8e6e1;
            }

            .photo-footer {
                padding: 6vh 1rem 5rem;
            }
        }
    </style>

    <script>
    const photos = [
        'alpine-lake.jpg',
        'banyan-tree-6A29610A.jpg',
        'beach-boardwalk.jpg',
        'beach-solitude.jpg',
        'berlin-street.jpg',

        'buoys-wall.jpg',
        'cdmx-plaza.jpg',
        'concrete-museum.jpg',
        'cypress-kayak-F5BA8A7A.jpg',
        'diwali-gifts-7E597412.jpg',
        'fireworks-water.jpg',
        'glass-sculpture-C9B56AB5.jpg',
        'hawaii-landscape.jpg',
        'infinity-room-BD764E63.jpg',
        'japan-bridge-night-03BAB9C2.jpg',
        'japan-gallery-quilt-27BBE65D.jpg',
        'jungle-path-DAB66F7D.jpg',
        'kitchen-night.jpg',
        'lanterns.jpg',
        'mexico-plaza-476B1258.jpg',
        'misty-hillside.jpg',
        'night-market.jpg',
        'night-street.jpg',
        'papel-picado.jpg',
        'reed-corridor.jpg',
        'restaurant-night.jpg',
        'roma-sidewalk.jpg',
        'sayulita-staircase.jpg',
        'scooter-beach.jpg',
        'sea-cliff-8632EF29.jpg',
        'snowy-pass-648E669E.jpg',
        'staircase.jpg',
        'still-lake.jpg',
        'surfers-walking-6CE80723.jpg',
        'taco-cart.jpg',
        'tree-tunnel.jpg',
        'van-sleeping.jpg',
        'wood-spiral-4DC35586.jpg',
        'yosemite-trail.jpg',
        'yosemite-valley.jpg',
        'tetrapods-C617472A.jpg',
        'winnebago-4069A7FC.jpg',
        'jeep-stream-A0C4CAF7.jpg',
        'lavender-field-44DFB472.jpg',
        'calla-lilies-1CB0954F.jpg',
        'pine-boardwalk-7FB4DA90.jpg',
        'gnarled-tree-beach-9254A749.jpg',
        'misty-walkway-48FA8D97.jpg',
        'museum-hallway-4BC2AB1E.jpg',
        'dune-grass-path-2EFABBF7.jpg',
        'nyc-riverfront-DE8723B3.jpg',
        'forest-sunrays-C5ED39F1.jpg',
        'forest-bridge-creek-194CECED.jpg',
        'bougainvillea-street-887A6F65.jpg',
        'puget-sound-clouds-836485B6.jpg',
        'chive-flowers-043155D7.jpg',
        'red-leaves-10B89607.jpg',
        'sheep-valley-18920780.jpg',
        'glacial-lake-28B7AF30.jpg',
        'poppy-macro-2B2A81D7.jpg',
        'buddha-plant-333E9F81.jpg',
        'firework-burst-5004742B.jpg',
        'langur-sitting-6C239336.jpg',
        'langur-climbing-9B6D6B84.jpg',
        'spotted-deer-D8AE667C.jpg',
        'beach-reflection-DDAF92C4.jpg',
        'dandelion-backlit-FA8413F4.jpg',
        'juniper-berries-07D3E4F0.jpg',
        'geranium-bw-1A1B3229.jpg',
        'beach-umbrella-1EB3BFB6.jpg'
    ];

    // Shuffle photos for a fresh order each visit
    for (let i = photos.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [photos[i], photos[j]] = [photos[j], photos[i]];
    }

    const gallery = document.getElementById('gallery');
    const counter = document.getElementById('photo-counter');

    let photoIndex = 0; // tracks position in the photos array
    let displayIndex = 0; // tracks the visual position for layout logic

    while (photoIndex < photos.length) {
        displayIndex++;

        // Every 5th position, create a diptych (if we have at least 2 photos left)
        if (displayIndex % 5 === 0 && photoIndex + 1 < photos.length) {
            const pair = document.createElement('div');
            pair.classList.add('photo-pair');
            pair.dataset.index = displayIndex;

            const inner = document.createElement('div');
            inner.classList.add('pair-inner');

            for (let p = 0; p < 2; p++) {
                const filename = photos[photoIndex];
                const img = document.createElement('img');
                img.src = 'photos/' + filename;
                img.alt = '';
                img.loading = photoIndex < 2 ? 'eager' : 'lazy';
                img.addEventListener('click', () => openLightbox('photos/' + filename));
                inner.appendChild(img);
                photoIndex++;
            }

            pair.appendChild(inner);
            gallery.appendChild(pair);
        } else {
            const filename = photos[photoIndex];
            const wrap = document.createElement('div');
            wrap.classList.add('photo-wrap');
            wrap.dataset.index = displayIndex;

            // Vary widths: every 3rd single photo is narrow
            if (displayIndex % 3 === 2) {
                wrap.classList.add('narrow');
            }

            // First item visible immediately
            if (displayIndex === 1) {
                wrap.classList.add('no-fade');
            }

            const img = document.createElement('img');
            img.src = 'photos/' + filename;
            img.alt = '';
            img.loading = photoIndex < 2 ? 'eager' : 'lazy';
            img.addEventListener('click', () => openLightbox('photos/' + filename));

            wrap.appendChild(img);
            gallery.appendChild(wrap);
            photoIndex++;
        }
    }

    // IntersectionObserver for fade-in (skip first item)
    const fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                fadeObserver.unobserve(entry.target);
            }
        });
    }, {
        threshold: 0.3
    });

    document.querySelectorAll('.photo-wrap:not(.no-fade), .photo-pair').forEach(el => {
        fadeObserver.observe(el);
    });

    // Photo counter — update on scroll
    const counterObserver = new IntersectionObserver((entries) => {
        // Find the most visible photo
        let bestEntry = null;
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                bestEntry = entry;
            }
        });
        if (bestEntry) {
            counter.textContent = bestEntry.target.dataset.index;
        }
    }, {
        threshold: 0.5
    });

    document.querySelectorAll('.photo-wrap, .photo-pair').forEach(el => {
        counterObserver.observe(el);
    });

    // Set initial counter
    counter.textContent = '1';

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(src) {
        lightboxImg.src = src;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }

    lightbox.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox();
    });

    // --- Auto-scroll: scroll each photo to center, hold, then continue ---
    (function() {
        if (window.innerWidth <= 768) return;

        const allWraps = document.querySelectorAll('.photo-wrap, .photo-pair');
        let currentPhotoIndex = 0;
        let paused = false;
        let manualPaused = false;
        let manualPauseTimer = null;
        let stopped = false;

        // Visual indicator
        const indicator = document.createElement('div');
        indicator.className = 'auto-scroll-indicator';
        indicator.textContent = 'scrolling';
        document.body.appendChild(indicator);
        indicator.addEventListener('animationend', () => indicator.remove());

        // Pause ONLY on photo hover
        allWraps.forEach(wrap => {
            wrap.addEventListener('mouseenter', () => { paused = true; });
            wrap.addEventListener('mouseleave', () => { paused = false; });
        });

        // Pause on manual scroll for 8 seconds
        function onManualScroll() {
            manualPaused = true;
            clearTimeout(manualPauseTimer);
            manualPauseTimer = setTimeout(() => { manualPaused = false; }, 8000);
        }
        window.addEventListener('wheel', onManualScroll, { passive: true });

        function scrollToPhoto(index) {
            if (index >= allWraps.length || stopped) { stopped = true; return; }
            const wrap = allWraps[index];
            const img = wrap.querySelector('img');
            if (!img) { currentPhotoIndex++; scrollToPhoto(currentPhotoIndex); return; }

            // Target: center the image in viewport
            const rect = wrap.getBoundingClientRect();
            const targetY = window.scrollY + rect.top - (window.innerHeight - rect.height) / 2;
            const startY = window.scrollY;
            const distance = targetY - startY;
            const duration = Math.min(Math.abs(distance) * 3, 4000); // slower: 3ms per pixel, max 4s
            const startTime = performance.now();

            function animate(now) {
                if (paused || manualPaused) {
                    requestAnimationFrame(animate);
                    return;
                }
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Ease in-out
                const ease = progress < 0.5
                    ? 2 * progress * progress
                    : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                window.scrollTo(0, startY + distance * ease);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Hold at center for 2.5 seconds
                    setTimeout(() => {
                        if (!stopped) {
                            currentPhotoIndex++;
                            scrollToPhoto(currentPhotoIndex);
                        }
                    }, 2500);
                }
            }
            requestAnimationFrame(animate);
        }

        // Start after page settles
        setTimeout(() => {
            scrollToPhoto(0);
        }, 2000);
    })();
    </script>
