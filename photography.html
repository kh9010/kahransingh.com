    <style>
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        .photo-page-header {
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e0ddd8;
        }

        .photo-page-header h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 2rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1.3;
            margin: 0;
        }

        .photo-page-header p {
            color: #999;
            font-size: 0.9rem;
            margin-top: 0.4rem;
        }

        .masonry {
            column-count: 3;
            column-gap: 0.75rem;
        }

        .masonry img {
            width: 100%;
            display: block;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .masonry img:hover {
            opacity: 0.85;
        }

        .photo-footer {
            text-align: center;
            padding: 3rem 0 1rem;
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-size: 0.8rem;
            color: #bbb;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            main {
                padding: 1.5rem 1rem 3rem;
            }

            .photo-page-header h1 {
                font-size: 1.6rem;
            }

            .masonry {
                column-count: 2;
                column-gap: 0.5rem;
            }

            .masonry img {
                margin-bottom: 0.5rem;
            }
        }
    </style>

        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
    const photos = [
        'alpine-lake.jpg',
        'banyan-tree-6A29610A.jpg',
        'beach-boardwalk.jpg',
        'beach-painter.jpg',
        'beach-solitude.jpg',
        'berlin-street.jpg',
        'bhutan-summit-6D1ECE66.jpg',
        'boat-friends-A963213F.jpg',
        'buoys-wall.jpg',
        'cdmx-plaza.jpg',
        'concrete-museum.jpg',
        'cypress-kayak-F5BA8A7A.jpg',
        'dead-forest.jpg',
        'diwali-gifts-7E597412.jpg',
        'fireworks-water.jpg',
        'glass-sculpture-C9B56AB5.jpg',
        'hawaii-landscape.jpg',
        'hudson-pier.jpg',
        'infinity-room-BD764E63.jpg',
        'japan-bridge-night-03BAB9C2.jpg',
        'japan-gallery-quilt-27BBE65D.jpg',
        'jungle-path-DAB66F7D.jpg',
        'kitchen-night.jpg',
        'lanterns.jpg',
        'mexico-plaza-476B1258.jpg',
        'misty-hillside.jpg',
        'night-market.jpg',
        'night-street.jpg',
        'papel-picado.jpg',
        'rainy-night.jpg',
        'reed-corridor.jpg',
        'restaurant-night.jpg',
        'roma-sidewalk.jpg',
        'sayulita-staircase.jpg',
        'scooter-beach.jpg',
        'sea-cliff-8632EF29.jpg',
        'sidewalk-shadows.jpg',
        'snowy-pass-648E669E.jpg',
        'staircase.jpg',
        'still-lake.jpg',
        'surfers-walking-6CE80723.jpg',
        'taco-cart.jpg',
        'tree-tunnel.jpg',
        'van-sleeping.jpg',
        'wood-spiral-4DC35586.jpg',
        'wyoming-road.jpg',
        'yosemite-trail.jpg',
        'yosemite-valley.jpg'
    ];

    // Shuffle photos for a fresh layout each visit
    for (let i = photos.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [photos[i], photos[j]] = [photos[j], photos[i]];
    }

    const gallery = document.getElementById('gallery');

    photos.forEach(filename => {
        const img = document.createElement('img');
        img.src = 'photos/' + filename;
        img.alt = '';
        img.loading = 'lazy';
        img.addEventListener('click', () => openLightbox('photos/' + filename));
        gallery.appendChild(img);
    });

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(src) {
        lightboxImg.src = src;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }

    lightbox.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox();
    });
    </script>
