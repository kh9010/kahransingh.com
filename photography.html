    <style>
        main {
            max-width: 100%;
            margin: 0 auto;
            padding: 2rem 1.5rem 0;
        }

        .photo-page-header {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 1rem;
            text-align: center;
        }

        .photo-page-header h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 2rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1.3;
            margin: 0;
        }

        .photo-page-header p {
            color: #bbb;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            letter-spacing: 0.03em;
        }

        /* Single-column gallery */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25vh;
        }

        .photo-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 25vh 0;
        }

        .photo-wrap img {
            max-width: 900px;
            width: 100%;
            display: block;
            cursor: pointer;
            filter: contrast(1.05);
        }

        /* Alternate narrower widths for breathing rhythm */
        .photo-wrap.narrow img {
            max-width: 650px;
        }

        /* Diptych pairs */
        .photo-pair {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 25vh 0;
        }

        .photo-pair .pair-inner {
            display: flex;
            gap: 0.5rem;
            max-width: 1100px;
            width: 100%;
        }

        .photo-pair .pair-inner img {
            width: 50%;
            display: block;
            cursor: pointer;
            filter: contrast(1.05);
            object-fit: cover;
        }

        /* Fade-in animation */
        .photo-wrap, .photo-pair {
            opacity: 0;
            transition: opacity 2.5s ease;
        }

        .photo-wrap.visible, .photo-pair.visible {
            opacity: 1;
        }

        .photo-wrap.no-fade, .photo-pair.no-fade {
            opacity: 1;
            transition: none;
        }

        /* Photo counter */
        .photo-counter {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            color: #e8e6e1;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        /* Footer */
        .photo-footer {
            text-align: center;
            padding: 10vh 0 6rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .photo-footer p {
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-size: 0.85rem;
            color: #bbb;
            margin: 0 0 1.5rem;
        }

        .photo-footer a {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: #999;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
            padding-bottom: 2px;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .photo-footer a:hover {
            color: #333;
            border-color: #999;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        /* Auto-scroll indicator */
        .auto-scroll-indicator {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            animation: scrollIndicatorFade 4s ease forwards;
        }

        .auto-scroll-indicator::after {
            content: ' \u25BE';
            font-size: 0.8em;
        }

        @keyframes scrollIndicatorFade {
            0% { opacity: 0; }
            15% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (max-width: 768px) {
            main {
                padding: 1.5rem 1rem 0;
            }

            .photo-page-header h1 {
                font-size: 1.6rem;
            }

            .gallery {
                padding-top: 10vh;
            }

            .photo-wrap {
                padding: 10vh 0;
            }

            .photo-wrap img {
                max-width: 100%;
                padding: 0 0.5rem;
                box-sizing: border-box;
            }

            .photo-wrap.narrow img {
                max-width: 100%;
            }

            .photo-pair {
                padding: 10vh 0;
            }

            .photo-pair .pair-inner {
                max-width: 100%;
                padding: 0 0.5rem;
                box-sizing: border-box;
            }

            .photo-counter {
                bottom: 1.2rem;
                right: 1.2rem;
                font-size: 0.65rem;
                color: #e8e6e1;
            }

            .photo-footer {
                padding: 6vh 1rem 5rem;
            }
        }

    <script>
    const allPhotos = [
        // Q2 Monochrome (B&W)
        { f: 'alpine-lake.jpg', c: 'q2mono' },
        { f: 'beach-boardwalk.jpg', c: 'q2mono' },
        { f: 'beach-solitude.jpg', c: 'q2mono' },

        { f: 'tree-tunnel.jpg', c: 'q2mono' },
        { f: 'van-sleeping.jpg', c: 'q2mono' },
        { f: 'yosemite-trail.jpg', c: 'q2mono' },
        { f: 'yosemite-valley.jpg', c: 'q2mono' },
        { f: 'tetrapods-C617472A.jpg', c: 'q2mono' },
        { f: 'lavender-field-44DFB472.jpg', c: 'q2mono' },
        { f: 'calla-lilies-1CB0954F.jpg', c: 'q2mono' },
        { f: 'pine-boardwalk-7FB4DA90.jpg', c: 'q2mono' },
        { f: 'gnarled-tree-beach-9254A749.jpg', c: 'q2mono' },
        { f: 'misty-walkway-48FA8D97.jpg', c: 'q2mono' },
        { f: 'museum-hallway-4BC2AB1E.jpg', c: 'q2mono' },
        { f: 'dune-grass-path-2EFABBF7.jpg', c: 'q2mono' },

        { f: 'forest-sunrays-C5ED39F1.jpg', c: 'q2mono' },
        { f: 'juniper-berries-07D3E4F0.jpg', c: 'q2mono' },
        { f: 'geranium-bw-1A1B3229.jpg', c: 'q2mono' },
        { f: 'beach-umbrella-1EB3BFB6.jpg', c: 'q2mono' },
        // Q2 Color
        { f: 'banyan-tree-6A29610A.jpg', c: 'q2' },
        { f: 'berlin-street.jpg', c: 'q2' },
        { f: 'bhutan-summit-6D1ECE66.jpg', c: 'q2' },
        { f: 'boat-friends-A963213F.jpg', c: 'q2' },
        { f: 'cypress-kayak-F5BA8A7A.jpg', c: 'q2' },
        { f: 'glass-sculpture-C9B56AB5.jpg', c: 'q2' },
        { f: 'infinity-room-BD764E63.jpg', c: 'q2' },
        { f: 'japan-bridge-night-03BAB9C2.jpg', c: 'q2' },
        { f: 'japan-gallery-quilt-27BBE65D.jpg', c: 'q2' },
        { f: 'jungle-path-DAB66F7D.jpg', c: 'q2' },
        { f: 'mexico-plaza-476B1258.jpg', c: 'q2' },
        { f: 'sea-cliff-8632EF29.jpg', c: 'q2' },
        { f: 'snowy-pass-648E669E.jpg', c: 'q2' },
        { f: 'surfers-walking-6CE80723.jpg', c: 'q2' },
        { f: 'winnebago-4069A7FC.jpg', c: 'q2' },
        { f: 'jeep-stream-A0C4CAF7.jpg', c: 'q2' },
        // Fuji X100
        { f: 'forest-bridge-creek-194CECED.jpg', c: 'fuji' },
        { f: 'bougainvillea-street-887A6F65.jpg', c: 'fuji' },
        { f: 'puget-sound-clouds-836485B6.jpg', c: 'fuji' },
        // Canon
        { f: 'diwali-gifts-7E597412.jpg', c: 'canon' },
        { f: 'wood-spiral-4DC35586.jpg', c: 'canon' },
        { f: 'chive-flowers-043155D7.jpg', c: 'canon' },
        { f: 'red-leaves-10B89607.jpg', c: 'canon' },
        { f: 'sheep-valley-18920780.jpg', c: 'canon' },
        { f: 'glacial-lake-28B7AF30.jpg', c: 'canon' },
        { f: 'poppy-macro-2B2A81D7.jpg', c: 'canon' },
        { f: 'buddha-plant-333E9F81.jpg', c: 'canon' },
        { f: 'firework-burst-5004742B.jpg', c: 'canon' },
        { f: 'langur-sitting-6C239336.jpg', c: 'canon' },
        { f: 'langur-climbing-9B6D6B84.jpg', c: 'canon' },
        { f: 'spotted-deer-D8AE667C.jpg', c: 'canon' },
        { f: 'beach-reflection-DDAF92C4.jpg', c: 'canon' },
        { f: 'dandelion-backlit-FA8413F4.jpg', c: 'canon' }
    ];

    // Filter by URL parameter: ?camera=mono, ?camera=q2, ?camera=fuji, ?camera=canon
    const params = new URLSearchParams(window.location.search);
    const cameraFilter = params.get('camera');
    let photos = cameraFilter
        ? allPhotos.filter(p => p.c === cameraFilter).map(p => p.f)
        : allPhotos.map(p => p.f);

    // Shuffle
    for (let i = photos.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [photos[i], photos[j]] = [photos[j], photos[i]];
    }

    const gallery = document.getElementById('gallery');
    const counter = document.getElementById('photo-counter');

    let photoIndex = 0; // tracks position in the photos array
    let displayIndex = 0; // tracks the visual position for layout logic

    while (photoIndex < photos.length) {
        displayIndex++;

        // Every 5th position, create a diptych (if we have at least 2 photos left)
        if (displayIndex % 5 === 0 && photoIndex + 1 < photos.length) {
            const pair = document.createElement('div');
            pair.classList.add('photo-pair');
            pair.dataset.index = displayIndex;

            const inner = document.createElement('div');
            inner.classList.add('pair-inner');

            for (let p = 0; p < 2; p++) {
                const filename = photos[photoIndex];
                const img = document.createElement('img');
                img.src = 'photos/' + filename;
                img.alt = '';
                img.loading = photoIndex < 2 ? 'eager' : 'lazy';
                img.addEventListener('click', () => openLightbox('photos/' + filename));
                inner.appendChild(img);
                photoIndex++;
            }

            pair.appendChild(inner);
            gallery.appendChild(pair);
        } else {
            const filename = photos[photoIndex];
            const wrap = document.createElement('div');
            wrap.classList.add('photo-wrap');
            wrap.dataset.index = displayIndex;

            // Vary widths: every 3rd single photo is narrow
            if (displayIndex % 3 === 2) {
                wrap.classList.add('narrow');
            }

            // First item visible immediately
            if (displayIndex === 1) {
                wrap.classList.add('no-fade');
            }

            const img = document.createElement('img');
            img.src = 'photos/' + filename;
            img.alt = '';
            img.loading = photoIndex < 2 ? 'eager' : 'lazy';
            img.addEventListener('click', () => openLightbox('photos/' + filename));

            wrap.appendChild(img);
            gallery.appendChild(wrap);
            photoIndex++;
        }
    }

    // IntersectionObserver for fade-in (skip first item)
    const fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                fadeObserver.unobserve(entry.target);
            }
        });
    }, {
        threshold: 0.3
    });

    document.querySelectorAll('.photo-wrap:not(.no-fade), .photo-pair').forEach(el => {
        fadeObserver.observe(el);
    });

    // Photo counter — update on scroll
    const counterObserver = new IntersectionObserver((entries) => {
        // Find the most visible photo
        let bestEntry = null;
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                bestEntry = entry;
            }
        });
        if (bestEntry) {
            counter.textContent = bestEntry.target.dataset.index;
        }
    }, {
        threshold: 0.5
    });

    document.querySelectorAll('.photo-wrap, .photo-pair').forEach(el => {
        counterObserver.observe(el);
    });

    // Set initial counter
    counter.textContent = '1';

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(src) {
        lightboxImg.src = src;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }

    lightbox.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox();
    });

    // --- Auto-scroll: scroll each photo to center, hold, then continue ---
    (function() {
        // Auto-scroll on all devices — touch users can still scroll manually

        const allWraps = document.querySelectorAll('.photo-wrap, .photo-pair');
        let currentPhotoIndex = 0;
        let paused = false;
        let manualPaused = false;
        let manualPauseTimer = null;
        let stopped = false;

        // Visual indicator
        const indicator = document.createElement('div');
        indicator.className = 'auto-scroll-indicator';
        indicator.textContent = 'scrolling';
        document.body.appendChild(indicator);
        indicator.addEventListener('animationend', () => indicator.remove());

        // Pause on photo hover (desktop) and tap (mobile)
        allWraps.forEach(wrap => {
            wrap.addEventListener('mouseenter', () => { paused = true; });
            wrap.addEventListener('mouseleave', () => { paused = false; });
            wrap.addEventListener('touchstart', () => { paused = true; }, { passive: true });
            wrap.addEventListener('touchend', () => { paused = false; }, { passive: true });
        });

        // Pause on manual scroll — stop auto completely, resume after 10s idle
        function onManualScroll() {
            manualPaused = true;
            clearTimeout(manualPauseTimer);
            manualPauseTimer = setTimeout(() => {
                manualPaused = false;
                // Find which photo is currently centered and resume from there
                let closest = 0;
                let closestDist = Infinity;
                allWraps.forEach((wrap, i) => {
                    const el = wrap.querySelector('.pair-inner') || wrap.querySelector('img') || wrap;
                    const rect = el.getBoundingClientRect();
                    const center = rect.top + rect.height / 2 - window.innerHeight / 2;
                    if (Math.abs(center) < closestDist) {
                        closestDist = Math.abs(center);
                        closest = i;
                    }
                });
                currentPhotoIndex = closest + 1;
                scrollToPhoto(currentPhotoIndex);
            }, 10000);
        }
        window.addEventListener('wheel', onManualScroll, { passive: true });
        window.addEventListener('touchmove', onManualScroll, { passive: true });

        function scrollToPhoto(index) {
            if (index >= allWraps.length || stopped) { stopped = true; return; }
            const wrap = allWraps[index];
            const img = wrap.querySelector('img');
            if (!img) { currentPhotoIndex++; scrollToPhoto(currentPhotoIndex); return; }

            // For pairs, center on the .pair-inner; for singles, center on the img
            const centerEl = wrap.querySelector('.pair-inner') || img;

            function doScroll() {
                const imgRect = centerEl.getBoundingClientRect();
                // If image hasn't loaded yet (height 0), wait
                if (imgRect.height < 50 && img.naturalHeight === 0) {
                    img.addEventListener('load', doScroll, { once: true });
                    return;
                }

                const targetY = window.scrollY + imgRect.top - (window.innerHeight - imgRect.height) / 2;
                const startY = window.scrollY;
                const distance = targetY - startY;

                // Skip if already very close
                if (Math.abs(distance) < 10) {
                    setTimeout(() => {
                        if (!stopped) { currentPhotoIndex++; scrollToPhoto(currentPhotoIndex); }
                    }, 4000);
                    return;
                }

                const duration = Math.min(Math.abs(distance) * 8, 8000);
                let elapsed = 0;
                let lastTime = performance.now();

                function animate(now) {
                    if (paused || manualPaused) {
                        lastTime = now; // don't count paused time
                        requestAnimationFrame(animate);
                        return;
                    }
                    elapsed += now - lastTime;
                    lastTime = now;

                    const progress = Math.min(elapsed / duration, 1);
                    const ease = -(Math.cos(Math.PI * progress) - 1) / 2;
                    window.scrollTo(0, startY + distance * ease);

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        setTimeout(() => {
                            if (!stopped) { currentPhotoIndex++; scrollToPhoto(currentPhotoIndex); }
                        }, 4000);
                    }
                }
                requestAnimationFrame(animate);
            }

            doScroll();
        }

        // Start after page settles
        setTimeout(() => {
            scrollToPhoto(0);
        }, 2000);
    })();
    </script>
