<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>One Beautiful Moment — Kahran Singh</title>
    <meta property="og:title" content="One Beautiful Moment — Kahran Singh">
    <meta property="og:description" content="Where you don't have to decide anything, you don't have to do anything.">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://kahransingh.com/poems/one-beautiful-moment.html">
    <meta property="og:image" content="https://kahransingh.com/photos/taco-cart.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="One Beautiful Moment — Kahran Singh">
    <meta name="twitter:description" content="Where you don't have to decide anything, you don't have to do anything.">
    <meta name="twitter:image" content="https://kahransingh.com/photos/taco-cart.jpg">
    <link rel="canonical" href="https://kahransingh.com/poems/one-beautiful-moment.html">
    <link rel="stylesheet" href="poem.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poem-scroll">
        <div class="stanza title-slide">
            <div class="stanza-text">One Beautiful Moment</div>
            <div class="poem-meta"></div>
            <div class="scroll-hint">
                <span>scroll</span>
                <div class="chevron"></div>
            </div>
        </div>

        <div class="stanza">
            <div class="stanza-text">One beautiful moment

Where you don&rsquo;t have to decide anything

You don&rsquo;t have to do anything

The world has stopped

You can just be.</div>
        </div>

        <div class="stanza">
            <div class="stanza-text">And feel veins on your fingers

Bring the slightly chilled blood

Back to your heart.</div>
        </div>

        <div class="stanza">
            <div class="stanza-text">That, my friends, is the moment before death.</div>
        </div>

        <div class="stanza end-slide">
            <div class="stanza-text"><a href="/poetry.html">&larr; poems</a></div>
        </div>
    </div>

    <script>
    const stanzas = document.querySelectorAll('.stanza-text');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.animation = 'none';
                entry.target.offsetHeight;
                entry.target.style.animation = 'fadeIn 0.8s ease forwards';
            }
        });
    }, { threshold: 0.5 });
    stanzas.forEach(s => observer.observe(s));
    </script>
    <script src="related.js"></script>
</body>
</html>
