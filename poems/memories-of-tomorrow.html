<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories of tomorrow — Kahran Singh</title>
    <link rel="stylesheet" href="poem.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poem-scroll">
        <div class="stanza title-slide">
            <div class="stanza-text">Memories of tomorrow</div>
            <div class="poem-meta"></div>
            <div class="scroll-hint">
                <span>scroll</span>
                <div class="chevron"></div>
            </div>
        </div>

        <div class="stanza">
            <div class="stanza-text">I wonder,
will This be,
when I, tomorrow,
remember today?</div>
        </div>

        <div class="stanza">
            <div class="stanza-text">As I stare
at the hazy notes of tomorrow,
and wonder
if they
emote today.</div>
        </div>

        <div class="stanza">
            <div class="stanza-text">After all, the trees are there
before tomorrow,
and they will be
before my today,
so who,
Who am I to say?</div>
        </div>

        <div class="stanza end-slide">
            <div class="stanza-text"><a href="/poetry.html">&larr; poems</a></div>
        </div>
    </div>

    <script>
    const stanzas = document.querySelectorAll('.stanza-text');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.animation = 'none';
                entry.target.offsetHeight;
                entry.target.style.animation = 'fadeIn 0.8s ease forwards';
            }
        });
    }, { threshold: 0.5 });
    stanzas.forEach(s => observer.observe(s));
    </script>
</body>
</html>
