<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everytime you wink at me &mdash; Kahran Singh</title>
    <link rel="stylesheet" href="poem.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poem-scroll">
        <div class="stanza title-slide">
            <div class="stanza-text">Everytime you wink at me</div>
            <div class="poem-meta">from How the World Works</div>
            <div class="scroll-hint">
                <span>scroll</span>
                <div class="chevron"></div>
            </div>
        </div>

        <div class="stanza">
            <div class="stanza-text">Everytime you wink at me
I wonder if my heart skipped a beat
Or if I just forgot to breath
for a minute</div>
        </div>

        <div class="stanza">
            <div class="stanza-text">I wonder if the excitement can bubble up my chest
Can you be so excited that you forget to breath
I think so,
I just did</div>
        </div>

        <div class="stanza end-slide">
            <div class="stanza-text"><a href="/poetry.html">&larr; poems</a></div>
        </div>
    </div>

    <script>
    const stanzas = document.querySelectorAll('.stanza-text');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.animation = 'none';
                entry.target.offsetHeight;
                entry.target.style.animation = 'fadeIn 0.8s ease forwards';
            }
        });
    }, { threshold: 0.5 });
    stanzas.forEach(s => observer.observe(s));
    </script>
    <script src="related.js"></script>
</body>
</html>
