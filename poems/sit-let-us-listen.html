    <meta property="og:description" content="Watch the game board. See the leaves. The women and the dogs.">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://kahransingh.com/poems/sit-let-us-listen.html">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sit let us listen to the sound of this moment — Kahran Singh">

    <link rel="canonical" href="https://kahransingh.com/poems/sit-let-us-listen.html">
    <link rel="stylesheet" href="poem.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400;1,6..96,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poem-scroll">
        <div class="stanza title-slide">
            <div class="stanza-text">Sit let us listen to the sound of this moment</div>
            <div class="scroll-hint">
                <span>scroll</span>
                <div class="chevron"></div>
            </div>
        </div>

        <div class="stanza">
            <div class="stanza-text">Sit let us listen to the sound of this moment
Watch the game board
See the leaves
The women and the dogs
The cars
The wind
And in the flowers
All that is today and will be
Tomorrow</div>
        </div>

        <div class="stanza end-slide">
            <div class="stanza-text"><a href="/poetry.html">&larr; poems</a></div>
        </div>
    </div>

    <script>
    const stanzas = document.querySelectorAll('.stanza-text');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.animation = 'none';
                entry.target.offsetHeight;
                entry.target.style.animation = 'fadeIn 0.8s ease forwards';
            }
        });
    }, { threshold: 0.5 });
    stanzas.forEach(s => observer.observe(s));
    </script>
    <script src="related.js"></script>
</body>
</html>
