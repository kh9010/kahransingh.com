<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Glass Houses &mdash; Kahran Singh</title>
    <meta property="og:title" content="Glass Houses — Kahran Singh">

    <meta property="og:type" content="article">
    <meta property="og:url" content="https://kahransingh.com/poems/glass-houses.html">
    <meta property="og:image" content="https://kahransingh.com/photos/roma-sidewalk.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Glass Houses — Kahran Singh">
    <meta name="twitter:description" content="You would think we were going to live for eternity">
    <meta name="twitter:image" content="https://kahransingh.com/photos/roma-sidewalk.jpg">
    <link rel="canonical" href="https://kahransingh.com/poems/glass-houses.html">
    <link rel="stylesheet" href="poem.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400;1,6..96,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poem-scroll">
        <div class="stanza title-slide">
            <div class="stanza-text">Glass Houses</div>
            <div class="poem-meta"></div>
            <div class="scroll-hint">
                <span>scroll</span>
                <div class="chevron"></div>
            </div>
        </div>

        <div class="stanza">
            <div class="stanza-text">Glass houses
We take so much time
To build our houses
A ledge here
A porch there</div>
        </div>

        <div class="stanza">
            <div class="stanza-text">You would think we were going to live for eternity
And our house was meant to be our
Final solitude as the madness of age set in
And the weariness of routine
Comfort till death.</div>
        </div>

        <div class="stanza end-slide">
            <div class="stanza-text"><a href="/poetry.html">&larr; poems</a></div>
        </div>
    </div>

    <script>
    const stanzas = document.querySelectorAll('.stanza-text');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.animation = 'none';
                entry.target.offsetHeight;
                entry.target.style.animation = 'fadeIn 0.8s ease forwards';
            }
        });
    }, { threshold: 0.5 });
    stanzas.forEach(s => observer.observe(s));
    </script>
    <script src="related.js"></script>
</body>
</html>
