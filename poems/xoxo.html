<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Xoxo — Kahran Singh</title>
    <meta property="og:title" content="Xoxo — Kahran Singh">
    <meta property="og:description" content="How lucky am I; to be surrounded by; so much love">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://kahransingh.com/poems/xoxo.html">
    <meta property="og:image" content="https://kahransingh.com/photos/taco-cart.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Xoxo — Kahran Singh">
    <meta name="twitter:description" content="How lucky am I; to be surrounded by; so much love">
    <meta name="twitter:image" content="https://kahransingh.com/photos/taco-cart.jpg">
    <link rel="canonical" href="https://kahransingh.com/poems/xoxo.html">
    <link rel="stylesheet" href="poem.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400;1,6..96,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poem-scroll">
        <div class="stanza title-slide">
            <div class="stanza-text">Xoxo</div>
            <div class="poem-meta"></div>
            <div class="scroll-hint">
                <span>scroll</span>
                <div class="chevron"></div>
            </div>
        </div>

        <div class="stanza">
            <div class="stanza-text">Xoxo
How lucky am I;
To be surrounded by;
so much love,
We&rsquo;d have conversations
(about picking and choosing)
whose love,
We&rsquo;d rather keep.</div>
        </div>

        <div class="stanza end-slide">
            <div class="stanza-text"><a href="/poetry.html">&larr; poems</a></div>
        </div>
    </div>

    <script>
    const stanzas = document.querySelectorAll('.stanza-text');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.animation = 'none';
                entry.target.offsetHeight;
                entry.target.style.animation = 'fadeIn 0.8s ease forwards';
            }
        });
    }, { threshold: 0.5 });
    stanzas.forEach(s => observer.observe(s));
    </script>
    <script src="related.js"></script>
</body>
</html>
