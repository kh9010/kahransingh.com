let idx = 0;
let V = JSON.parse(localStorage.getItem('dv4') || '{}');

function upd() {
    document.getElementById('ct').textContent = Object.keys(V).length;
    document.getElementById('ok').textContent = Object.values(V).filter(v => v === 'd').length;
    document.getElementById('bad').textContent = Object.values(V).filter(v => v === 'k').length;
}

function show(i) {
    if (i < 0 || i >= G.length) return;
    idx = i;
    const g = G[i];
    const imgs = g.photos.map(p => {
        const badge = p.is_keep ? '<span class="keep">KEEP (largest)</span>' : '<span class="delete">would delete</span>';
        return '<div class="photo-card"><img src="' + p.path + '"><div class="label">' + p.uuid + ' ' + badge + '</div></div>';
    }).join('');
    document.getElementById('main').innerHTML =
        '<div class="group"><div class="group-header">' + (i+1) + ' / ' + G.length + ' &mdash; ' + g.photos.length + ' copies</div>' +
        '<div class="photos">' + imgs + '</div>' +
        '<div class="verdict">' +
        '<button onclick="mk(\'d\')">\u2713 Real duplicates</button>' +
        '<button class="btn-keep" onclick="mk(\'k\')">\u2717 NOT duplicates</button>' +
        '<button style="background:#1a1a1a;color:#555" onclick="go(1)">Skip &rarr;</button>' +
        '</div></div>';
    window.scrollTo(0, 0);
}

function mk(v) { V[idx] = v; localStorage.setItem('dv4', JSON.stringify(V)); upd(); go(1); }
function go(d) { show(idx + d); }
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') go(1);
    if (e.key === 'ArrowLeft') go(-1);
    if (e.key === '1') mk('d');
    if (e.key === '2') mk('k');
});
upd(); show(0);
</script>
