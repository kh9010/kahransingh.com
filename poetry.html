        { src: 'photos/dead-forest.jpg', alt: 'Dead forest', caption: 'Wyoming \u2014 Leica Q2 Monochrome' },
        { src: 'photos/yosemite-valley.jpg', alt: 'Friends on beach at sunset', caption: 'Yosemite \u2014 Leica Q2 Monochrome' },
        { src: 'photos/beach-boardwalk.jpg', alt: 'Boardwalk vanishing point through pines', caption: 'Fire Island, New York \u2014 Leica Q2 Monochrome' },
        { src: 'photos/beach-painter.jpg', alt: 'Person painting on beach', caption: 'Wyoming \u2014 Leica Q2 Monochrome' },
        { src: 'photos/berlin-street.jpg', alt: 'Street with vintage Porsche', caption: 'Berlin \u2014 Leica Q2 Monochrome' },
        { src: 'photos/rainy-night.jpg', alt: 'Rainy night by a house', caption: 'Portland, Maine \u2014 Leica Q2 Monochrome' },
        { src: 'photos/sidewalk-shadows.jpg', alt: 'Tree shadows on sidewalk', caption: 'Chicago \u2014 Leica Q2 Monochrome' },
        { src: 'photos/hudson-pier.jpg', alt: 'Waterfront pier', caption: 'New York City \u2014 Leica Q2 Monochrome' }
    ];

    function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    // Hero excerpt rotation
    var hero = pick(heroPoems);
    document.getElementById('hero-excerpt').textContent = hero.excerpt;
    var heroLink = document.getElementById('hero-link');
    heroLink.href = hero.href;
    document.getElementById('hero-link-text').textContent = 'Read \u201c' + hero.title + '\u201d \u2192';

    // Photo rotation
    var photo1 = pick(photos);
    var photoEl = document.getElementById('poetry-photo');
    photoEl.querySelector('img').src = photo1.src;
    photoEl.querySelector('img').alt = photo1.alt;
    photoEl.querySelector('figcaption').textContent = photo1.caption;

    var available2 = secondPhotos.filter(function(p) { return p.src !== photo1.src; });
    var photo2 = pick(available2.length ? available2 : secondPhotos);
    var photoEl2 = document.getElementById('poetry-photo-2');
    photoEl2.querySelector('img').src = photo2.src;
    photoEl2.querySelector('img').alt = photo2.alt;
    photoEl2.querySelector('figcaption').textContent = photo2.caption;

    // Three poems for today — ensure thematic diversity
    var shuffled = shuffle(allPoems);
    var selected = [shuffled[0]];
    var usedThemes = new Set(shuffled[0].themes);
    for (var i = 1; i < shuffled.length && selected.length < 3; i++) {
        var p = shuffled[i];
        var dominated = p.themes.every(function(t) { return usedThemes.has(t); });
        if (!dominated) {
            selected.push(p);
            p.themes.forEach(function(t) { usedThemes.add(t); });
        }
    }
    // Fill remaining if needed
    for (var i = 1; i < shuffled.length && selected.length < 3; i++) {
        if (selected.indexOf(shuffled[i]) === -1) selected.push(shuffled[i]);
    }

    var themeLabels = { wonder: 'wonder', mortality: 'mortality & time', love: 'love', place: 'place', nature: 'nature', identity: 'identity' };

    for (var i = 0; i < 3; i++) {
        var el = document.getElementById('moment-' + i);
        var s = selected[i];
        el.querySelector('.moment-link').href = s.href;
        el.querySelector('.moment-title').textContent = s.title;
        el.querySelector('.moment-excerpt').textContent = s.excerpt;
        var pillsHtml = '';
        s.themes.forEach(function(t) {
            pillsHtml += '<a href="/poems/all.html#' + t + '" class="theme-pill">' + (themeLabels[t] || t) + '</a>';
        });
        el.querySelector('.poem-themes').innerHTML = pillsHtml;
    }

    // IntersectionObserver for fadeIn on moments
    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.15 });

    document.querySelectorAll('.poetry-moment').forEach(function(el) {
        observer.observe(el);
    });
    </script>
</body>
